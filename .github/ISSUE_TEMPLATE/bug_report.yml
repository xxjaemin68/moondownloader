name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Paste URLs into the input
        2. Click Start
        3. ...
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider
      description: Which provider were you downloading from?
      placeholder: "datanodes.to / fuckingfast.co / both"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of MoonDownloader?
      placeholder: "v14.1"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output (moontech_*.log or crash_log.txt)
      render: text
